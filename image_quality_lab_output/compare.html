<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Quality Lab</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #1f2933;
    }
    header {
      padding: 24px;
      background: #111827;
      color: white;
    }
    main {
      padding: 20px;
    }
    .image-card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    h1, h2 {
      margin: 0 0 8px;
    }
    .note {
      margin: 0 0 14px;
      color: #52606d;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      align-items: start;
    }
    figure {
      margin: 0;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      background: #e5e7eb;
    }
    figcaption {
      padding: 10px;
      font-size: 13px;
      line-height: 1.45;
    }
    .label {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <header>
    <h1>Image Quality Lab</h1>
    <p>Non-destructive WebP comparison: original, q80, q85, q90, q95.</p>
  </header>
  <main>
    
            <section class="image-card">
              <h2>FridaySunrise.png</h2>
              <p class="note">No resize was applied.</p>
              <div class="grid">
                
    <figure>
      <img src="001_FridaySunrise/original.png" alt="Original">
      <figcaption>
        <div class="label">Original</div>
        <div>1.6 MiB</div>
        <div>1672x941</div>
      </figcaption>
    </figure>
    
    <figure>
      <img src="001_FridaySunrise/FridaySunrise_q80.webp" alt="WebP q80">
      <figcaption>
        <div class="label">WebP q80</div>
        <div>55.9 KiB</div>
        <div>96.5% saved</div>
      </figcaption>
    </figure>
    
    <figure>
      <img src="001_FridaySunrise/FridaySunrise_q85.webp" alt="WebP q85">
      <figcaption>
        <div class="label">WebP q85</div>
        <div>71.8 KiB</div>
        <div>95.5% saved</div>
      </figcaption>
    </figure>
    
    <figure>
      <img src="001_FridaySunrise/FridaySunrise_q90.webp" alt="WebP q90">
      <figcaption>
        <div class="label">WebP q90</div>
        <div>103.2 KiB</div>
        <div>93.6% saved</div>
      </figcaption>
    </figure>
    
    <figure>
      <img src="001_FridaySunrise/FridaySunrise_q95.webp" alt="WebP q95">
      <figcaption>
        <div class="label">WebP q95</div>
        <div>177.3 KiB</div>
        <div>89.0% saved</div>
      </figcaption>
    </figure>
    
              </div>
            </section>
            
  </main>
</body>
</html>
